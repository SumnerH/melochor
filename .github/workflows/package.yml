name: Package Executables

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0.0, v2.1.3
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ==========================================
      # WINDOWS-SPECIFIC SETUP (MSYS2)
      # ==========================================
      - name: Set up MSYS2 (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-python-numpy
            mingw-w64-x86_64-python-scipy
            mingw-w64-x86_64-python-soundfile
            mingw-w64-x86_64-python-sounddevice
            mingw-w64-x86_64-python-gobject
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-pyinstaller

      - name: Install Python Dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          python -m pip install --upgrade pip
          pip install audioread PyOpenGL

      - name: Download Static FFmpeg (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          curl.exe -L -o ffmpeg.zip https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v4.4.1/ffmpeg-4.4.1-win-64.zip
          Expand-Archive ffmpeg.zip -DestinationPath .
          Remove-Item ffmpeg.zip

      - name: Build Standalone Executable (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          pyinstaller --onefile --noconsole --add-binary "ffmpeg.exe;." --name="Melochor" main.py

      # ==========================================
      # MACOS-SPECIFIC SETUP
      # ==========================================
      - name: Set up Python (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install pygobject3 gtk4 gobject-introspection pkg-config

      - name: Install Python Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Download Static FFmpeg (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          curl -L -o ffmpeg.zip https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v4.4.1/ffmpeg-4.4.1-osx-64.zip
          unzip ffmpeg.zip
          chmod +x ffmpeg
          rm ffmpeg.zip

      - name: Build Standalone Executable (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --windowed --add-binary "ffmpeg:." --name="Melochor" main.py

      # ==========================================
      # ARTIFACT UPLOAD
      # ==========================================
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Melochor-${{ matrix.os }}
          path: |
            dist/Melochor.exe
            dist/Melochor.app
            dist/Melochor
          if-no-files-found: ignore
