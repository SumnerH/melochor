name: Package Executables

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0.0, v2.1.3
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-on-environment: true
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install pygobject3 gtk+3
          # PyOpenGL and Gtk compilation dependencies

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build Standalone Executable (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile --noconsole --name="FireworksVisualizer" main.py

      - name: Build Standalone Executable (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --windowed --name="FireworksVisualizer" main.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FireworksVisualizer-${{ matrix.os }}
          path: |
            dist/FireworksVisualizer.exe
            dist/FireworksVisualizer.app
            dist/FireworksVisualizer
