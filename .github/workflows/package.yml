name: Package Executables

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0.0, v2.1.3
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ==========================================
      # WINDOWS-SPECIFIC SETUP (MSYS2)
      # ==========================================
      - name: Set up MSYS2 (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-python-numpy
            mingw-w64-x86_64-python-scipy
            mingw-w64-x86_64-python-gobject
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-portaudio
            mingw-w64-x86_64-libsndfile
            mingw-w64-x86_64-pyinstaller

      - name: Install Python Dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          python -m pip install --upgrade pip setuptools
          pip install --no-deps sounddevice soundfile audioread PyOpenGL

      - name: Download Static FFmpeg (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          curl.exe -L -o ffmpeg.zip https://github.com/yt-dlp/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          Expand-Archive ffmpeg.zip -DestinationPath temp_ffmpeg
          # Find ffmpeg.exe recursively and move it to root
          Get-ChildItem -Path temp_ffmpeg -Filter ffmpeg.exe -Recurse | Move-Item -Destination .
          Remove-Item -Recurse temp_ffmpeg
          Remove-Item ffmpeg.zip

      - name: Build Standalone Executable (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          pyinstaller Melochor.spec

      - name: Validate Standalone Bundle (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          # 1. Run our python-based validation suite
          python validate_bundle.py dist/Melochor
          
          # 2. Run the actual compiled Melochor executable with --help to verify standalone launch sanity
          dist/Melochor/Melochor.exe --help

      - name: Compress Executable Folder (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/Melochor -DestinationPath dist/Melochor-Windows.zip

      # ==========================================
      # MACOS-SPECIFIC SETUP
      # ==========================================
      - name: Set up Python (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install gtk4 gobject-introspection pkg-config portaudio libsndfile libffi cairo
          
          # Force compile glib gsettings schemas to guarantee gschemas.compiled exists for PyInstaller
          for prefix in "/opt/homebrew" "/usr/local"; do
            if [ -d "$prefix/share/glib-2.0/schemas" ]; then
              echo "Compiling GSettings schemas in $prefix..."
              glib-compile-schemas "$prefix/share/glib-2.0/schemas" || true
            fi
          done
          
          # Set standard environment variables for dynamic pygobject compilation
          echo "PKG_CONFIG_PATH=$(brew --prefix libffi)/lib/pkgconfig" >> $GITHUB_ENV
          echo "LDFLAGS=-L$(brew --prefix libffi)/lib" >> $GITHUB_ENV
          echo "CPATH=$(brew --prefix libffi)/include" >> $GITHUB_ENV

      - name: Install Python Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          $pythonLocation/bin/python -m pip install --upgrade pip setuptools
          $pythonLocation/bin/python -m pip install pyinstaller
          $pythonLocation/bin/python -m pip install pycairo
          $pythonLocation/bin/python -m pip install pygobject
          $pythonLocation/bin/python -m pip install numpy scipy sounddevice soundfile audioread PyOpenGL

      - name: Download Static FFmpeg (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ]; then
            FFMPEG_URL="https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/release/ffmpeg.zip"
          else
            FFMPEG_URL="https://evermeet.cx/ffmpeg/getrelease"
          fi
          curl -L -o ffmpeg.zip "$FFMPEG_URL"
          unzip -o ffmpeg.zip
          # Robust Finder: Locate the ffmpeg binary inside any extracted folders and move it to the root
          find . -type f -name "ffmpeg" -exec mv {} . \;
          chmod +x ffmpeg
          rm -f ffmpeg.zip

      - name: Build Standalone Executable (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          $pythonLocation/bin/python -m PyInstaller Melochor.spec

      - name: Fix Library Paths (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          TARGETS="dist/Melochor.app"
          BREW_PREFIX=$(brew --prefix)
          
          for target in $TARGETS; do
            if [ -d "$target" ]; then
              echo "Fixing library paths and internal IDs in $target..."

              # Find dylibs, shared objects (C extensions), and the main executable
              find "$target" -type f \( -name "*.dylib" -o -name "*.so" -o -name "Melochor" \) | while read -r binary; do

                # Rewrite internal ID if the binary is a shared library
                if [[ "$binary" == *.dylib || "$binary" == *.so ]]; then
                  install_name_tool -id "@rpath/$(basename "$binary")" "$binary" 2>/dev/null || true
                fi

                # Extract any dependencies referencing Homebrew and map them to @rpath
                otool -L "$binary" | grep -E '^[[:space:]]' | grep "$BREW_PREFIX" | awk '{print $1}' | while read -r dep; do
                  new_dep="@rpath/$(basename "$dep")"

                  # Re-map the dependency path inside the binary
                  install_name_tool -change "$dep" "$new_dep" "$binary"
                done
                
                # Add explicit search-relative rpaths to ensure robust resolution inside nested folders
                install_name_tool -add_rpath "@loader_path/" "$binary" 2>/dev/null || true
                install_name_tool -add_rpath "@loader_path/../" "$binary" 2>/dev/null || true
                install_name_tool -add_rpath "@loader_path/../../" "$binary" 2>/dev/null || true
                install_name_tool -add_rpath "@loader_path/../../../" "$binary" 2>/dev/null || true
                install_name_tool -add_rpath "@loader_path/../../../../" "$binary" 2>/dev/null || true
                install_name_tool -add_rpath "@loader_path/../../../../../" "$binary" 2>/dev/null || true
              done
            fi
          done

      - name: Validate Standalone Bundle (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          $pythonLocation/bin/python validate_bundle.py dist/Melochor.app/Contents/MacOS

      - name: Re-sign Bundle (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          echo "Re-signing modified bundle: dist/Melochor.app..."
          codesign --force --deep --sign - dist/Melochor.app

      - name: Sanity Check (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # Run the actual compiled Melochor executable inside the App Bundle with --help to verify launch sanity
          dist/Melochor.app/Contents/MacOS/Melochor --help

      - name: Compress App Bundle (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          ditto -c -k --sequesterRsrc dist/Melochor.app dist/Melochor-macOS.zip

      # ==========================================
      # ARTIFACT UPLOAD
      # ==========================================
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Melochor-${{ matrix.os }}
          path: |
            dist/Melochor-Windows.zip
            dist/Melochor-macOS.zip
          if-no-files-found: ignore
