name: Package Executables

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0.0, v2.1.3
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ==========================================
      # WINDOWS-SPECIFIC SETUP (MSYS2)
      # ==========================================
      - name: Set up MSYS2 (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-python-numpy
            mingw-w64-x86_64-python-scipy
            mingw-w64-x86_64-python-gobject
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config

      - name: Install Python Dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          python -m pip install --upgrade pip setuptools
          pip install pyinstaller soundfile sounddevice audioread PyOpenGL

      - name: Download Static FFmpeg (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          curl.exe -L -o ffmpeg.zip https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v4.4.1/ffmpeg-4.4.1-win-64.zip
          Expand-Archive ffmpeg.zip -DestinationPath .
          Remove-Item ffmpeg.zip

      - name: Build Standalone Executable (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          pyinstaller Melochor.spec

      - name: Compress Executable Folder (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/Melochor -DestinationPath dist/Melochor-Windows.zip

      # ==========================================
      # MACOS-SPECIFIC SETUP
      # ==========================================
      - name: Set up Python (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install pygobject3 gtk4 gobject-introspection pkg-config

      - name: Install Python Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          python -m pip install --upgrade pip setuptools
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Download Static FFmpeg (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          curl -L -o ffmpeg.tar.xz https://github.com/yt-dlp/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-macosarm64-gpl.tar.xz
          tar -xf ffmpeg.tar.xz
          mv ffmpeg-master-*/bin/ffmpeg .
          chmod +x ffmpeg
          rm -rf ffmpeg-master-* ffmpeg.tar.xz

      - name: Build Standalone Executable (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller Melochor.spec

      - name: Fix Library Paths & Re-sign (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # 1. Define target paths (both flat folder and the actual App Bundle)
          TARGETS="dist/Melochor dist/Melochor.app"
          
          for target in $TARGETS; do
            if [ -d "$target" ]; then
              echo "Fixing library paths in $target..."

              # Find dylibs, shared objects (C extensions), and the main executable
              find "$target" -type f \( -name "*.dylib" -o -name "*.so" -o -name "Melochor" \) | while read -r binary; do

                # Extract any dependencies referencing Homebrew (both Apple Silicon and Intel paths)
                otool -L "$binary" | grep -E '(/opt/homebrew|/usr/local)' | awk '{print $1}' | while read -r dep; do
                  new_dep="@rpath/$(basename "$dep")"

                  # Re-map the dependency path inside the binary
                  install_name_tool -change "$dep" "$new_dep" "$binary"
                done
              done

              # 2. Re-sign the modified bundle to prevent "Killed: 9" security crashes
              echo "Re-signing modified bundle: $target..."
              codesign --force --deep --sign - "$target"
            fi
          done

      - name: Compress App Bundle (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          ditto -c -k --sequesterRsrc dist/Melochor.app dist/Melochor-macOS.zip

      # ==========================================
      # ARTIFACT UPLOAD
      # ==========================================
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Melochor-${{ matrix.os }}
          path: |
            dist/Melochor-Windows.zip
            dist/Melochor-macOS.zip
          if-no-files-found: ignore
